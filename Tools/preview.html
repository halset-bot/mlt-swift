<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MLTEncoder Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link  rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; }

    #legend {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(255,255,255,0.92);
      border-radius: 8px;
      padding: 12px 16px;
      font: 13px/1.6 system-ui, sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      min-width: 180px;
    }
    #legend h3 { margin: 0 0 8px; font-size: 14px; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .swatch      { width: 24px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .swatch.line { height: 4px; border-radius: 2px; }
    .swatch.pt   { width: 14px; height: 14px; border-radius: 50%; }
  </style>
</head>
<body>
<div id="map"></div>

<div id="legend">
  <h3>MLTEncoder Preview</h3>
  <div class="legend-row">
    <div class="swatch" style="background:rgba(70,130,180,.25);border:2px solid #4682b4;"></div>
    <span>Areas (polygon-fill)</span>
  </div>
  <div class="legend-row">
    <div class="swatch line" style="background:#e05c00;"></div>
    <span>Routes (line)</span>
  </div>
  <div class="legend-row">
    <div class="swatch pt" style="background:#2ecc71;border:2px solid #27ae60;"></div>
    <span>Cities (point)</span>
  </div>
  <p style="margin:8px 0 0;font-size:11px;color:#666;">
    Tile z=6 x=33 y=19<br>
    Generated by MLTEncoder
  </p>
</div>

<script>
// ── Embedded GeoJSON (generated by build-preview.js) ────────────────────────
const LAYERS = {
  "areas": {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "id": 20,
        "geometry": {
          "type": "Polygon",
          "coordinates": [
            [
              [
                6.499786,
                53.734091
              ],
              [
                6.499786,
                51.576216
              ],
              [
                11.000061,
                51.576216
              ],
              [
                11.000061,
                53.734091
              ],
              [
                6.499786,
                53.734091
              ]
            ]
          ]
        },
        "properties": {
          "name": "Demo region",
          "type": "bbox"
        }
      }
    ]
  },
  "routes": {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "id": 10,
        "geometry": {
          "type": "LineString",
          "coordinates": [
            [
              7.099915,
              52.960221
            ],
            [
              9.129639,
              51.868012
            ],
            [
              10.469971,
              53.097323
            ]
          ]
        },
        "properties": {
          "name": "E136 corridor",
          "type": "highway"
        }
      }
    ]
  },
  "cities": {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "id": 1,
        "geometry": {
          "type": "Point",
          "coordinates": [
            7.099915,
            52.960221
          ]
        },
        "properties": {
          "name": "Sogndal",
          "pop": 7000
        }
      },
      {
        "type": "Feature",
        "id": 2,
        "geometry": {
          "type": "Point",
          "coordinates": [
            9.129639,
            51.868012
          ]
        },
        "properties": {
          "name": "Dombås",
          "pop": 1300
        }
      },
      {
        "type": "Feature",
        "id": 3,
        "geometry": {
          "type": "Point",
          "coordinates": [
            10.469971,
            53.097323
          ]
        },
        "properties": {
          "name": "Lillehammer",
          "pop": 27000
        }
      }
    ]
  }
};

// ── Map setup ─────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      osm: {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxzoom: 19,
      },
    },
    layers: [
      { id: 'osm', type: 'raster', source: 'osm', paint: { 'raster-opacity': 0.6 } },
    ],
  },
  center: [8.8, 61.4],
  zoom: 6.5,
});

map.on('load', () => {

  // ── Add each decoded layer as a GeoJSON source ──────────────────────────────
  for (const [name, fc] of Object.entries(LAYERS)) {
    map.addSource(name, { type: 'geojson', data: fc });
  }

  // ── Polygon fill (areas layer) ──────────────────────────────────────────────
  if (LAYERS.areas) {
    map.addLayer({
      id:     'areas-fill',
      type:   'fill',
      source: 'areas',
      paint: {
        'fill-color':   '#4682b4',
        'fill-opacity': 0.15,
      },
    });
    map.addLayer({
      id:     'areas-outline',
      type:   'line',
      source: 'areas',
      paint: {
        'line-color': '#4682b4',
        'line-width': 2,
        'line-dasharray': [4, 3],
      },
    });
  }

  // ── Line (routes layer) ────────────────────────────────────────────────────
  if (LAYERS.routes) {
    map.addLayer({
      id:     'routes-line',
      type:   'line',
      source: 'routes',
      layout: {
        'line-cap':  'round',
        'line-join': 'round',
      },
      paint: {
        'line-color': '#e05c00',
        'line-width': 3,
      },
    });
    map.addLayer({
      id:     'routes-label',
      type:   'symbol',
      source: 'routes',
      layout: {
        'symbol-placement': 'line',
        'text-field':       ['get', 'name'],
        'text-size':        12,
        'text-offset':      [0, -0.8],
      },
      paint: {
        'text-color':       '#e05c00',
        'text-halo-color':  '#fff',
        'text-halo-width':  1.5,
      },
    });
  }

  // ── Points / circles (cities layer) ────────────────────────────────────────
  if (LAYERS.cities) {
    map.addLayer({
      id:     'cities-circle',
      type:   'circle',
      source: 'cities',
      paint: {
        'circle-radius':       7,
        'circle-color':        '#2ecc71',
        'circle-stroke-color': '#27ae60',
        'circle-stroke-width': 2,
      },
    });
    map.addLayer({
      id:     'cities-label',
      type:   'symbol',
      source: 'cities',
      layout: {
        'text-field':  ['get', 'name'],
        'text-size':   13,
        'text-offset': [0, -1.5],
        'text-anchor': 'bottom',
      },
      paint: {
        'text-color':      '#1a5c2a',
        'text-halo-color': '#fff',
        'text-halo-width': 1.5,
      },
    });
  }

  // ── Popup on click ────────────────────────────────────────────────────────
  const clickLayers = ['cities-circle', 'routes-line', 'areas-fill'].filter(id => map.getLayer(id));
  map.on('click', clickLayers, e => {
    const f    = e.features[0];
    const props = f.properties;
    const html  = Object.entries(props)
      .map(([k, v]) => `<b>${k}</b>: ${v}`)
      .join('<br>');
    new maplibregl.Popup()
      .setLngLat(e.lngLat)
      .setHTML(html || '(no properties)')
      .addTo(map);
  });

  clickLayers.forEach(id => {
    map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
  });
});
</script>
</body>
</html>
